<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Urban Life — Systems Map</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
  background: #111; border-bottom: 1px solid #1e1e1e;
  display: flex; align-items: center; padding: 0 16px; gap: 14px;
}
.title { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: #555; white-space: nowrap; }
.legend { display: flex; gap: 12px; font-size: 11px; color: #555; }
.leg { display: flex; align-items: center; gap: 5px; }
.ldot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.sep { width: 1px; height: 20px; background: #222; flex-shrink: 0; }
.tbar-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
button.tbtn {
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #666; font-size: 11px;
  padding: 4px 11px; border-radius: 5px; cursor: pointer; white-space: nowrap;
}
button.tbtn:hover { background: #222; color: #bbb; border-color: #444; }
button.tbtn.accent { background: #1a2e1a; border-color: #2a4a2a; color: #6abf69; }
button.tbtn.accent:hover { background: #1f3a1f; color: #81c784; }
button.tbtn:disabled { opacity: 0.4; cursor: not-allowed; }
button.tbtn:disabled:hover { background: #1a1a1a; border-color: #2a2a2a; color: #666; }

#sync-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #3a3a3a;
  transition: background 0.3s; cursor: default; flex-shrink: 0;
}
#sync-dot.connected  { background: #4caf50; }
#sync-dot.pending    { background: #ffb300; }
#sync-dot.error      { background: #f44336; }
#sync-label { font-size: 10px; color: #3a3a3a; white-space: nowrap; transition: color 0.3s; }
#sync-label.connected { color: #4a5a4a; }
#sync-label.pending   { color: #5a4a1a; }
#sync-label.error     { color: #5a2a2a; }

#wrap { position: fixed; top: 44px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; touch-action: none; }
#wrap.panning { cursor: grabbing; }
#canvas { position: absolute; transform-origin: 0 0; }
svg#lines { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }

.cat-box { position: absolute; border-radius: 10px; background: #141414; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: box-shadow 0.15s; }
.cat-box:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.7); }
.cat-box.dragging { box-shadow: 0 12px 40px rgba(0,0,0,0.9); z-index: 50; }
.cat-inner { border-radius: 10px; overflow: hidden; }
.cat-header { padding: 0 10px; height: 34px; display: flex; align-items: center; gap: 7px; font-size: 10px; font-weight: 800; letter-spacing: 1.3px; color: #fff; cursor: move; }
.cat-label { flex: 1; pointer-events: none; }
.cat-count { font-size: 9px; opacity: 0.55; font-weight: 400; white-space: nowrap; pointer-events: none; }
.hdr-btn { width: 18px; height: 18px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; font-weight: 700; }
.cat-header:hover .hdr-btn { opacity: 1; }
.hdr-add { background: rgba(255,255,255,0.2); color: #fff; }
.hdr-add:hover { background: rgba(255,255,255,0.35); }
.hdr-del { background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.65); font-size: 15px; }
.hdr-del:hover { background: rgba(180,0,0,0.55); color: #fff; }
.cat-grid { padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; background: #141414; }
.chip { display: flex; align-items: center; gap: 4px; background: #1c1c1c; border-radius: 4px; padding: 0 6px; height: 22px; overflow: hidden; border: 1px solid #252525; cursor: pointer; transition: border-color 0.12s, background 0.12s; }
.chip:hover { border-color: #3a3a3a; background: #222; }
.chip.active-chip { border-color: #555 !important; background: #252525 !important; }
.chip.done { color: #ccc; }
.chip.gdd  { color: #90caf9; border-color: #1a3360; }
.chip.pending { color: #555; }
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; cursor: pointer; transition: transform 0.12s; }
.chip-dot:hover { transform: scale(1.5); }
.chip-name { font-size: 10.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; pointer-events: none; }
.chip-x { display: none; width: 14px; height: 14px; background: rgba(180,0,0,0.7); border: none; border-radius: 3px; color: #fff; font-size: 11px; cursor: pointer; flex-shrink: 0; align-items: center; justify-content: center; padding: 0; }
.chip:hover .chip-x { display: flex; }
.chip-x:hover { background: rgba(220,0,0,0.9); }
.add-row { grid-column: span 2; display: flex; gap: 4px; padding: 2px 0; }
.add-row input { flex: 1; background: #222; border: 1px solid #444; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 10.5px; outline: none; height: 22px; }
.add-row input:focus { border-color: #666; }
.add-row select { background: #222; border: 1px solid #444; color: #ccc; border-radius: 4px; padding: 0 3px; font-size: 10px; height: 22px; cursor: pointer; }
.add-ok     { width: 22px; height: 22px; border-radius: 4px; border: none; cursor: pointer; background: #2e5a2e; color: #81c784; font-size: 13px; display: flex; align-items: center; justify-content: center; }
.add-cancel { width: 22px; height: 22px; border-radius: 4px; border: none; cursor: pointer; background: #3a1a1a; color: #ef9a9a; font-size: 15px; display: flex; align-items: center; justify-content: center; }
.add-ok:hover { background: #3a7a3a; } .add-cancel:hover { background: #5a2020; }

#sb-backdrop {
  display: none; position: fixed; inset: 0; z-index: 94;
  background: rgba(0,0,0,0.5);
}
#sb-backdrop.show { display: block; }

#sb-handle {
  width: 36px; height: 4px; background: #2a2a2a; border-radius: 2px;
  margin: 10px auto 0; flex-shrink: 0; display: none;
}

#sidebar { position: fixed; top: 44px; right: -310px; width: 298px; bottom: 0; z-index: 95; background: #161616; border-left: 1px solid #1e1e1e; display: flex; flex-direction: column; transition: right 0.25s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
#sidebar.open { right: 0; }
#sb-color-bar { height: 5px; flex-shrink: 0; transition: background 0.2s; }
#sb-header { padding: 12px 14px 10px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0; }
#sb-top-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
#sb-name { font-size: 14px; font-weight: 700; color: #e0e0e0; flex: 1; line-height: 1.3; }
#sb-close { width: 22px; height: 22px; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 5px; color: #555; font-size: 15px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
#sb-close:hover { background: #2a2a2a; color: #ccc; }
#sb-cat-label { font-size: 10px; color: #444; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
.sb-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
.sb-badge.d { background: #1a3a1a; color: #81c784; }
.sb-badge.g { background: #1a2a4a; color: #90caf9; }
.sb-badge.p { background: #1e1e1e; color: #444; }
.sb-badge-dot { width: 5px; height: 5px; border-radius: 50%; }
.sb-badge.d .sb-badge-dot { background: #4caf50; }
.sb-badge.g .sb-badge-dot { background: #2196f3; }
.sb-badge.p .sb-badge-dot { background: #3a3a3a; }
#sb-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 16px; }
#sb-body::-webkit-scrollbar { width: 3px; }
#sb-body::-webkit-scrollbar-track { background: #161616; }
#sb-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
.sb-sec-title { font-size: 10px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
#sb-desc { font-size: 12px; color: #666; line-height: 1.65; border-radius: 5px; outline: none; padding: 6px 8px; cursor: text; white-space: pre-wrap; word-break: break-word; border: 1px solid transparent; min-height: 32px; user-select: text; transition: border-color 0.12s, background 0.12s; }
#sb-desc:hover  { border-color: #222; background: #1c1c1c; }
#sb-desc:focus  { border-color: #2e2e2e; background: #1c1c1c; color: #888; }
#sb-desc:empty::before { content: 'Escribe una descripción...'; color: #333; }
#sb-progress { font-size: 10px; color: #3a3a3a; }
#sb-progress span { color: #81c784; font-weight: 600; }
#sb-subs { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.sb-sub { display: flex; align-items: flex-start; gap: 8px; padding: 5px 7px; border-radius: 5px; cursor: pointer; font-size: 11px; color: #555; border: 1px solid transparent; transition: background 0.1s, color 0.1s; }
.sb-sub:hover  { background: #1c1c1c; color: #888; border-color: #222; }
.sb-sub.checked { color: #81c784; }
.sb-sub.checked:hover { background: #1a2e1a; border-color: #2a4a2a; }
.sb-check { font-size: 13px; flex-shrink: 0; line-height: 1.3; }
.sb-sub-text { flex: 1; line-height: 1.4; }
.sb-empty { font-size: 11px; color: #2e2e2e; font-style: italic; padding: 6px 0; }
#sb-blocks { display: flex; flex-direction: column; gap: 3px; }
.sb-block { position: relative; border-radius: 5px; border: 1px solid transparent; padding: 5px 8px 5px 6px; display: flex; align-items: flex-start; gap: 7px; transition: border-color 0.12s, background 0.12s; user-select: text; }
.sb-block:hover { border-color: #222; background: #1c1c1c; }
.sb-block:focus-within { border-color: #2e2e2e; background: #1c1c1c; }
.sb-block-type { flex-shrink: 0; width: 16px; height: 16px; border-radius: 3px; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; }
.sb-block.title    .sb-block-type { background: #2a2a2a; color: #666; }
.sb-block.subtitle .sb-block-type { background: #222; color: #555; }
.sb-block.body     .sb-block-type { background: #1e1e1e; color: #444; }
.sb-block-text { flex: 1; outline: none; cursor: text; white-space: pre-wrap; word-break: break-word; min-height: 1em; line-height: 1.5; user-select: text; }
.sb-block.title    .sb-block-text { font-size: 13px; font-weight: 700; color: #ddd; }
.sb-block.subtitle .sb-block-text { font-size: 12px; font-weight: 600; color: #999; }
.sb-block.body     .sb-block-text { font-size: 11px; color: #666; line-height: 1.65; }
.sb-block-text:empty::before { color: #2e2e2e; font-style: italic; font-weight: 400; }
.sb-block.title    .sb-block-text:empty::before { content: 'Título...'; font-size: 13px; }
.sb-block.subtitle .sb-block-text:empty::before { content: 'Subtítulo...'; font-size: 12px; }
.sb-block.body     .sb-block-text:empty::before { content: 'Escribe aquí...'; font-size: 11px; }
.sb-block-del { display: none; width: 16px; height: 16px; background: rgba(180,0,0,0.6); border: none; border-radius: 3px; color: #fff; font-size: 12px; cursor: pointer; flex-shrink: 0; align-items: center; justify-content: center; padding: 0; margin-top: 1px; user-select: none; }
.sb-block:hover .sb-block-del { display: flex; }
.sb-block-del:hover { background: rgba(220,0,0,0.9); }
#sb-add-wrap { position: relative; }
#sb-add-btn { width: 100%; padding: 6px; background: #1a1a1a; border: 1px dashed #2a2a2a; border-radius: 5px; color: #3a3a3a; font-size: 11px; cursor: pointer; transition: border-color 0.12s, color 0.12s; text-align: center; }
#sb-add-btn:hover { border-color: #444; color: #666; background: #1c1c1c; }
#sb-add-menu { display: none; position: absolute; bottom: calc(100% + 4px); left: 0; right: 0; background: #1e1e1e; border: 1px solid #2e2e2e; border-radius: 7px; overflow: hidden; z-index: 10; }
#sb-add-menu.show { display: block; }
.sb-add-opt { width: 100%; padding: 8px 12px; background: none; border: none; color: #888; font-size: 11px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; }
.sb-add-opt:hover { background: #252525; color: #ccc; }
.sb-add-opt .opt-badge { width: 18px; height: 18px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; }
#modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
#modal-bg.show { display: flex; }
#modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; width: 300px; display: flex; flex-direction: column; gap: 14px; }
#modal h3 { font-size: 13px; color: #ccc; font-weight: 700; }
#modal label { font-size: 11px; color: #666; display: flex; flex-direction: column; gap: 5px; }
#modal input[type=text] { background: #222; border: 1px solid #333; color: #ccc; border-radius: 6px; padding: 7px 10px; font-size: 12px; outline: none; }
#modal input[type=color] { height: 34px; padding: 2px 4px; cursor: pointer; border-radius: 6px; border: 1px solid #333; background: #222; width: 100%; }
#modal input:focus { border-color: #555; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.modal-btns button { padding: 6px 16px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; }
.modal-btns .ok { background: #2e5a2e; color: #81c784; }
.modal-btns .ok:hover { background: #3a7a3a; }
.modal-btns .cancel { background: #222; color: #777; }
.modal-btns .cancel:hover { background: #2e2e2e; color: #bbb; }
#footer { position: fixed; bottom: 10px; right: 14px; font-size: 10px; color: #2a2a2a; background: #0f0f0f; padding: 4px 10px; border-radius: 6px; border: 1px solid #1a1a1a; }

/* Back button */
#sb-back-btn { width: 22px; height: 22px; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 5px; color: #666; font-size: 18px; cursor: pointer; flex-shrink: 0; display: none; align-items: center; justify-content: center; line-height: 1; padding: 0; }
#sb-back-btn:hover { background: #2a2a2a; color: #ccc; }
#sb-back-btn.visible { display: flex; }

/* Category sidebar system list */
.sb-sys-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sb-sys-arrow { color: #333; font-size: 15px; margin-left: auto; }
.sb-sub.sys { color: #666; }
.sb-sub.sys:hover { color: #aaa; }

/* Image block */
.sb-block.image .sb-block-type { background: #1a1e2e; color: #64b5f6; }
.sb-block-url { width: 100%; background: #1e1e1e; border: 1px solid #2a2a2a; color: #666; border-radius: 4px; padding: 4px 7px; font-size: 10px; outline: none; box-sizing: border-box; }
.sb-block-url:focus { border-color: #3a3a3a; color: #aaa; }
.sb-block-img { max-width: 100%; border-radius: 5px; display: block; margin-top: 5px; cursor: zoom-in; }

/* Touch screens: always show buttons that rely on hover */
@media (hover: none) {
  .chip-x { display: flex; }
  .hdr-btn { opacity: 0.7 !important; }
  .sb-block-del { display: flex; }
}

/* Mobile layout */
@media (max-width: 600px) {
  #toolbar { gap: 6px; padding: 0 8px; }
  #toolbar > .sep:first-of-type { display: none; }
  .legend { display: none; }
  .title { font-size: 9px; letter-spacing: 0.8px; }
  button.tbtn { padding: 3px 7px; font-size: 10px; }
  #sync-label { display: none; }
  #footer { display: none; }

  #sidebar {
    width: 100%;
    right: 0 !important;
    top: auto;
    bottom: -85vh;
    height: 85vh;
    border-left: none;
    border-top: 1px solid #1e1e1e;
    border-radius: 14px 14px 0 0;
    transition: bottom 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  #sidebar.open { bottom: 0; }
  #sb-handle { display: block; }
}
  </style>
</head>
<body>

<div id="toolbar">
  <span class="title">URBAN LIFE — SYSTEMS MAP</span>
  <div class="sep"></div>
  <div class="legend">
    <span class="leg"><span class="ldot" style="background:#4caf50"></span>Implementado</span>

  <div id="sb-color-bar"></div>

        <span id="sb-sec-subs">Subtemas</span>

          <button class="sb-add-opt" onclick="addBlock('subtitle')"><span class="opt-badge" style="background:#222;color:#666">S</span> Subtítulo</button>

      </div>

</div>

<div id="modal-bg">
  <div id="modal">
    <h3>Nueva Categoría</h3>
    <label>Nombre<input id="m-name" type="text" placeholder="ej. INVENTARIO"></label>
    <label>Color<input id="m-color" type="color" value="#546e7a"></label>

      <button class="cancel" onclick="closeModal()">Cancelar</button>
      <button class="ok" onclick="confirmModal()">Crear</button>
    </div>
  </div>
</div>

<div id="footer"></div>

<script>
// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
const SUPA_URL = 'https://jzlbacoxajcodnoytcsv.supabase.co';
const SUPA_KEY = 'sb_publishable_olXNAE19HldONgXL1WvRnA_4S-9sOPZ';
let db = null;
try { db = window.supabase?.createClient(SUPA_URL, SUPA_KEY); } catch(e) { console.warn('Supabase init failed', e); }

let saveTimer   = null;
let applyingRemote = false;

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = '';
  lbl.className = '';
  const map = {
    connecting:   [''           , 'Conectando...'],
    connected:    ['connected'  , 'En línea'],
    pending:      ['pending'    , 'Guardando...'],
    saved:        ['connected'  , 'Guardado'],
    error:        ['error'      , 'Error al guardar'],
    offline:      ['error'      , 'Sin conexión'],
  };
  const [cls, text] = map[state] || ['', state];
  if (cls) { dot.classList.add(cls); lbl.classList.add(cls); }
  lbl.textContent = text;
}

async function loadFromDB() {
  if (!db) { setSyncStatus('offline'); return; }
  const { data, error } = await db.from('map_state').select('data').eq('id','main').single();
  if (error) { console.error('Load error:', error); setSyncStatus('offline'); return; }
  if (data?.data?.cats) applyRemoteState(data.data, true);
}

function applyRemoteState(state, force = false) {
  if (!force && saveTimer !== null) return;
  applyingRemote = true;

  if (state.customContent) Object.assign(customContent, state.customContent);
  if (state.subChecked)    Object.assign(subChecked,    state.subChecked);

  if (state.cats && Array.isArray(state.cats)) {
    const remoteIds = new Set(state.cats.map(c => c.id));
    for (let i = cats.length - 1; i >= 0; i--) {
      if (!remoteIds.has(cats[i].id)) {
        if (nodeMap[cats[i].id]) { canvas.removeChild(nodeMap[cats[i].id].el); delete nodeMap[cats[i].id]; }
        cats.splice(i, 1);
      }
    }
    state.cats.forEach(rc => {
      const idx = cats.findIndex(c => c.id === rc.id);
      if (idx === -1) {
        cats.push({ ...rc });
        buildCatEl(cats[cats.length - 1]);
      } else {
        cats[idx] = { ...rc };
        if (nodeMap[rc.id]) {
          nodeMap[rc.id].pos = { x: rc.x, y: rc.y };
          nodeMap[rc.id].el.style.left = rc.x + 'px';
          nodeMap[rc.id].el.style.top  = rc.y + 'px';
        }
        refreshCat(cats[idx]);
      }
    });
    drawLines();
    updateFooter();
  }

  applyingRemote = false;
}

function scheduleSave() {
  if (applyingRemote) return;
  setSyncStatus('pending');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 800);
}

async function saveNow() {
  saveTimer = null;
  if (!db) { setSyncStatus('offline'); return; }
  const snapshot = cats.map(cat => {
    const pos = nodeMap[cat.id] ? nodeMap[cat.id].pos : { x: cat.x, y: cat.y };
    return { ...cat, x: Math.round(pos.x), y: Math.round(pos.y), _addOpen: false };
  });
  const { error } = await db.from('map_state')
    .update({ data: { cats: snapshot, customContent, subChecked }, updated_at: new Date().toISOString() })
    .eq('id', 'main');
  if (error) { console.error('Save error:', error); setSyncStatus('error'); }
  else setSyncStatus('saved');
}

function subscribeRealtime() {
  if (!db) return;
  db.channel('map-sync')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'map_state', filter: 'id=eq.main' },
      payload => { applyRemoteState(payload.new.data); })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') setSyncStatus('connected');
      else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') setSyncStatus('offline');
    });
}

let customContent = {};
function getCC(name) {
  if (!customContent[name]) customContent[name] = { desc: null, blocks: [] };
  return customContent[name];
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const subChecked = {};
const nodeMap    = {};
let scale=0.72, panX=60, panY=20;
let activeChip=null, currentSys=null, currentKey=null, prevCat=null;
const canvas  = document.getElementById('canvas');
const svgEl   = document.getElementById('lines');
const wrap    = document.getElementById('wrap');
const sidebar = document.getElementById('sidebar');
const ROW=26, PAD=8, HDR=34;

// ═══════════════════════════════════════
// UNDO/REDO HISTORY
// ═══════════════════════════════════════
const undoStack = [];
const redoStack = [];
const MAX_HISTORY = 50;
let burstActive = false, burstTimer = null;
let pendingDragSnap = null;

// Snapshot serializes live state, using current drag positions from nodeMap
function snapState(){
  return JSON.stringify({
    cats: cats.map(c=>{
      const p=nodeMap[c.id]?nodeMap[c.id].pos:{x:c.x,y:c.y};
      return {...c,x:Math.round(p.x),y:Math.round(p.y),_addOpen:false};
    }),
    customContent, subChecked
  });
}

function pushSnap(json){
  if(applyingRemote)return;
  burstActive=false;clearTimeout(burstTimer);
  undoStack.push(json);
  if(undoStack.length>MAX_HISTORY)undoStack.shift();
  redoStack.length=0;
  updateHistoryUI();
}

// Discrete actions: call BEFORE mutating state
function recordAction(){ pushSnap(snapState()); }

// Text typing: the FIRST keystroke of a burst captures the pre-edit state
// (the model is updated after this call, so snapState() is still pre-change).
// The burst closes after 800ms without typing or on any discrete action.
function recordTextChange(){
  if(applyingRemote)return;
  if(!burstActive){
    burstActive=true;
    undoStack.push(snapState());
    if(undoStack.length>MAX_HISTORY)undoStack.shift();
    redoStack.length=0;
    updateHistoryUI();
  }
  clearTimeout(burstTimer);
  burstTimer=setTimeout(()=>{burstActive=false;},800);
}

function applySnapshot(json){
  const s=JSON.parse(json);
  applyingRemote=true;
  Object.keys(nodeMap).forEach(id=>{canvas.removeChild(nodeMap[id].el);delete nodeMap[id];});
  cats.length=0;
  s.cats.forEach(c=>cats.push(c));
  Object.keys(customContent).forEach(k=>delete customContent[k]);
  Object.assign(customContent,s.customContent);
  Object.keys(subChecked).forEach(k=>delete subChecked[k]);
  Object.assign(subChecked,s.subChecked);
  renderAll();
  refreshSidebarView();
  applyingRemote=false;
  scheduleSave(); // propagate the restored state to other sessions
}

// Re-render the open sidebar so it reflects the restored state
function refreshSidebarView(){
  if(!sidebar.classList.contains('open'))return;
  if(currentSys){
    const cat=cats.find(c=>c.s.some(x=>x[0]===currentSys));
    if(cat){prevCat=prevCat?cats.find(c=>c.id===prevCat.id)||null:null;openSidebar(currentSys,cat);}
    else closeSidebar();
  }else if(currentKey){
    const cat=cats.find(c=>c.id===currentKey);
    if(cat)openCategorySidebar(cat);else closeSidebar();
  }
}

function undo(){
  if(undoStack.length===0)return;
  burstActive=false;clearTimeout(burstTimer);
  redoStack.push(snapState());
  applySnapshot(undoStack.pop());
  updateHistoryUI();
}

function redo(){
  if(redoStack.length===0)return;
  burstActive=false;clearTimeout(burstTimer);
  undoStack.push(snapState());
  applySnapshot(redoStack.pop());
  updateHistoryUI();
}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.altKey){
    const k=e.key.toLowerCase();
    if(k==='z'&&!e.shiftKey){e.preventDefault();undo();}
    else if(k==='y'||(k==='z'&&e.shiftKey)){e.preventDefault();redo();}
  }
});

function updateHistoryUI(){
  const undoBtn=document.getElementById('undo-btn');
  const redoBtn=document.getElementById('redo-btn');
  undoBtn.disabled=undoStack.length===0;
  redoBtn.disabled=redoStack.length===0;
}

function boxH(cat){return HDR+PAD+Math.ceil(cat.s.length/2)*ROW+PAD+(cat._addOpen?30:0);}
function centerOf(cat){const p=nodeMap[cat.id]?nodeMap[cat.id].pos:{x:cat.x,y:cat.y};return{x:p.x+cat.w/2,y:p.y+boxH(cat)/2};}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderAll(){cats.forEach(c=>nodeMap[c.id]?refreshCat(c):buildCatEl(c));updateFooter();drawLines();}

function buildCatEl(cat){
  const pos={x:cat.x,y:cat.y};
  const box=document.createElement('div');
  box.className='cat-box';
  box.style.cssText=`left:${pos.x}px;top:${pos.y}px;width:${cat.w}px`;
  const inner=document.createElement('div');
  inner.className='cat-inner';
  inner.style.cssText=`border:1px solid ${cat.col}44;border-radius:10px`;
  inner.appendChild(buildHeader(cat));
  inner.appendChild(buildGrid(cat));
  box.appendChild(inner);
  canvas.appendChild(box);
  nodeMap[cat.id]={el:box,pos};
  addDragBehavior(box,cat);
}
function refreshCat(cat){
  const inner=nodeMap[cat.id].el.querySelector('.cat-inner');
  inner.replaceChild(buildHeader(cat),inner.querySelector('.cat-header'));
  inner.replaceChild(buildGrid(cat),inner.querySelector('.cat-grid'));
}
function buildHeader(cat){
  const done=cat.s.filter(x=>x[1]==='d').length,gdd=cat.s.filter(x=>x[1]==='g').length;
  const hdr=document.createElement('div');
  hdr.className='cat-header';hdr.style.background=cat.col;
  hdr.innerHTML=`<span class="cat-label">${cat.l}</span><span class="cat-count">${done}✓ ${gdd>0?gdd+'◈ ':''}${cat.s.length-done-gdd}○</span>`;
  const addBtn=mkEl('button','hdr-btn hdr-add','+');
  noMD(addBtn);addBtn.onclick=e=>{e.stopPropagation();toggleAddForm(cat);};
  const delBtn=mkEl('button','hdr-btn hdr-del','×');
  noMD(delBtn);delBtn.onclick=e=>{e.stopPropagation();if(confirm(`¿Eliminar "${cat.l}"?`))deleteCategory(cat.id);};
  hdr.append(addBtn,delBtn);return hdr;
}
function buildGrid(cat){
  const grid=document.createElement('div');grid.className='cat-grid';
  cat.s.forEach(([name,st],idx)=>{
    const chip=document.createElement('div');
    chip.className='chip '+(st==='d'?'done':st==='g'?'gdd':'pending');
    const dot=mkEl('span','chip-dot');dot.style.background=SC[st];
    noMD(dot);dot.onclick=e=>{e.stopPropagation();cycleStatus(cat,idx);};
    const lbl=mkEl('span','chip-name',name);
    const xBtn=mkEl('button','chip-x','×');
    noMD(xBtn);xBtn.onclick=e=>{e.stopPropagation();deleteSystem(cat.id,idx);};
    chip.append(dot,lbl,xBtn);
    chip.onclick=e=>{if(e.target===dot||e.target===xBtn)return;prevCat=null;setActiveChip(chip);openSidebar(name,cat);};
    grid.appendChild(chip);
  });
  if(cat._addOpen){
    const row=document.createElement('div');row.className='add-row';
    const inp=document.createElement('input');inp.type='text';inp.placeholder='Nombre del sistema...';
    const sel=document.createElement('select');sel.innerHTML='<option value="p">○ Pend.</option><option value="g">◈ GDD</option><option value="d">✓ Impl.</option>';
    const ok=mkEl('button','add-ok','✓');const cancel=mkEl('button','add-cancel','×');
    [inp,sel,ok,cancel].forEach(noMD);
    ok.onclick=()=>{const n=inp.value.trim();if(n){recordAction();cat.s.push([n,sel.value]);cat._addOpen=false;refreshCat(cat);drawLines();updateFooter();scheduleSave();}};
    cancel.onclick=()=>{cat._addOpen=false;refreshCat(cat);};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')ok.click();if(e.key==='Escape')cancel.click();e.stopPropagation();});
    row.append(inp,sel,ok,cancel);grid.appendChild(row);
    requestAnimationFrame(()=>inp.focus());
  }
  return grid;
}
function mkEl(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function noMD(e){e.addEventListener('mousedown',ev=>ev.stopPropagation());}

function setActiveChip(chip){if(activeChip)activeChip.classList.remove('active-chip');activeChip=chip;if(chip)chip.classList.add('active-chip');}

function openSidebar(name,cat){
  currentSys=name; currentKey=name;
  const info=INFO[name];const cc=getCC(name);
  const sys=cat.s.find(s=>s[0]===name);const st=sys?sys[1]:'p';
  document.getElementById('sb-color-bar').style.background=cat.col;
  document.getElementById('sb-name').textContent=name;
  document.getElementById('sb-cat-label').textContent=cat.l;
  const badge=document.getElementById('sb-badge');
  badge.style.display='';badge.className='sb-badge '+st;
  document.getElementById('sb-status-text').textContent=st==='d'?'Implementado':st==='g'?'GDD Listo':'Pendiente';
  document.getElementById('sb-sec-subs').textContent='Subtemas';
  const backBtn=document.getElementById('sb-back-btn');
  if(prevCat){backBtn.classList.add('visible');}else{backBtn.classList.remove('visible');}
  const descEl=document.getElementById('sb-desc');
  descEl.textContent=cc.desc!==null?cc.desc:(info?info.desc:'');
  const capName=name;
  descEl.oninput=()=>{recordTextChange();getCC(capName).desc=descEl.textContent;scheduleSave();};
  const ul=document.getElementById('sb-subs');ul.innerHTML='';
  const subs=info?info.subs:[];
  if(subs.length>0){
    subs.forEach((sub,i)=>{
      const key=name+'::'+i;const checked=!!subChecked[key];
      const li=document.createElement('li');li.className='sb-sub'+(checked?' checked':'');
      const ck=mkEl('span','sb-check',checked?'☑':'☐');
      const tx=mkEl('span','sb-sub-text',sub);
      li.append(ck,tx);
      li.onclick=()=>{recordAction();subChecked[key]=!subChecked[key];li.className='sb-sub'+(subChecked[key]?' checked':'');ck.textContent=subChecked[key]?'☑':'☐';updateProgress(name,subs.length);scheduleSave();};
      ul.appendChild(li);
    });
    updateProgress(name,subs.length);
  }else{
    ul.innerHTML='<li class="sb-empty">Sin subtemas definidos.</li>';
    document.getElementById('sb-progress').textContent='';
  }
  renderBlocks(name);
  sidebar.classList.add('open');
  if(window.innerWidth<=600) document.getElementById('sb-backdrop').classList.add('show');
  document.getElementById('sb-add-menu').classList.remove('show');
}

function openCategorySidebar(cat){
  prevCat=null; currentSys=null; currentKey=cat.id;
  setActiveChip(null);
  const cc=getCC(cat.id);
  const done=cat.s.filter(x=>x[1]==='d').length;
  const gdd=cat.s.filter(x=>x[1]==='g').length;
  const pend=cat.s.length-done-gdd;
  document.getElementById('sb-color-bar').style.background=cat.col;
  document.getElementById('sb-name').textContent=cat.l;
  document.getElementById('sb-cat-label').textContent=`${cat.s.length} sistemas`;
  document.getElementById('sb-badge').style.display='none';
  document.getElementById('sb-back-btn').classList.remove('visible');
  document.getElementById('sb-sec-subs').textContent='Sistemas';
  const progEl=document.getElementById('sb-progress');
  progEl.innerHTML=`<span>${done}</span> ✓ &nbsp;<span style="color:#90caf9">${gdd}</span> ◈ &nbsp;${pend} ○`;
  const descEl=document.getElementById('sb-desc');
  descEl.textContent=cc.desc!==null?cc.desc:'';
  const capId=cat.id;
  descEl.oninput=()=>{recordTextChange();getCC(capId).desc=descEl.textContent;scheduleSave();};
  const ul=document.getElementById('sb-subs');ul.innerHTML='';
  cat.s.forEach(([name,st])=>{
    const li=document.createElement('li');li.className='sb-sub sys';

    const nm=mkEl('span','sb-sub-text',name);

    li.append(dot,nm,arr);

  sidebar.classList.add('open');
  if(window.innerWidth<=600) document.getElementById('sb-backdrop').classList.add('show');
  document.getElementById('sb-add-menu').classList.remove('show');
}

function goBack(){if(prevCat){const c=prevCat;prevCat=null;openCategorySidebar(c);}}

function updateProgress(name,total){
  const done=Object.entries(subChecked).filter(([k,v])=>k.startsWith(name+'::')&&v).length;
  const el=document.getElementById('sb-progress');

function closeSidebar(){

const TYPE_LABELS={title:'T',subtitle:'S',body:'¶',image:'↑'};
function renderBlocks(key){

  const container=document.getElementById('sb-blocks');container.innerHTML='';
  cc.blocks.forEach(b=>{
    const block=document.createElement('div');block.className='sb-block '+b.type;

    if(b.type==='image'){
      const wrap=document.createElement('div');wrap.style.flex='1';

      urlInp.addEventListener('mousedown',e=>e.stopPropagation());

      imgEl.style.display=b.url?'block':'none';if(b.url)imgEl.src=b.url;
      urlInp.oninput=()=>{recordTextChange();b.url=urlInp.value.trim();imgEl.src=b.url;imgEl.style.display=b.url?'block':'none';scheduleSave();};
      imgEl.onclick=()=>{if(b.url)window.open(b.url,'_blank');};
      wrap.append(urlInp,imgEl);block.append(badge,wrap,del);
    }else{
      const text=document.createElement('div');text.className='sb-block-text';
      text.contentEditable='true';text.spellcheck=false;text.textContent=b.text;
      text.oninput=()=>{recordTextChange();b.text=text.textContent;scheduleSave();};
      text.addEventListener('mousedown',e=>e.stopPropagation());
      text.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&b.type!=='body')e.preventDefault();e.stopPropagation();});
      block.append(badge,text,del);
      if(b.text==='')requestAnimationFrame(()=>text.focus());
    }
    container.appendChild(block);
  });
}

function toggleAddForm(cat){cat._addOpen=!cat._addOpen;refreshCat(cat);}
function deleteSystem(catId,idx){recordAction();const c=cats.find(x=>x.id===catId);c.s.splice(idx,1);refreshCat(c);drawLines();updateFooter();scheduleSave();}
function cycleStatus(cat,idx){recordAction();cat.s[idx][1]=STATUS_CYCLE[cat.s[idx][1]];refreshCat(cat);updateFooter();scheduleSave();}
function deleteCategory(id){
  recordAction();
  const i=cats.findIndex(c=>c.id===id);if(i===-1)return;
  canvas.removeChild(nodeMap[id].el);delete nodeMap[id];cats.splice(i,1);
  drawLines();updateFooter();closeSidebar();scheduleSave();

  const id='cat_'+Date.now();
  cats.push({id,l:label.toUpperCase(),col,x:200,y:200,w:280,s:[]});
  buildCatEl(cats[cats.length-1]);updateFooter();drawLines();scheduleSave();
}

// ═══════════════════════════════════════
// DRAG (mouse + touch)
// ═══════════════════════════════════════
function addDragBehavior(box,cat){
  let dragging=false,ox=0,oy=0,didDrag=false,startX=0,startY=0,onHeader=false;

  // Mouse drag
  box.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    const t=e.target;
    if(t.tagName==='BUTTON'||t.tagName==='INPUT'||t.tagName==='SELECT'||t.contentEditable==='true')return;
    e.stopPropagation();
    dragging=true;didDrag=false;
    pendingDragSnap=snapState();
    startX=e.clientX;startY=e.clientY;
    onHeader=!!e.target.closest('.cat-header');
    box.classList.add('dragging');
    const p=nodeMap[cat.id].pos;ox=e.clientX/scale-p.x;oy=e.clientY/scale-p.y;
    window.addEventListener('mousemove',onDrag);window.addEventListener('mouseup',onUp);
  });
  function onDrag(e){
    if(!dragging)return;
    if(Math.hypot(e.clientX-startX,e.clientY-startY)>4)didDrag=true;
    const nx=e.clientX/scale-ox,ny=e.clientY/scale-oy;
    nodeMap[cat.id].pos={x:nx,y:ny};box.style.left=nx+'px';box.style.top=ny+'px';drawLines();
  }
  function onUp(){
    dragging=false;box.classList.remove('dragging');
    window.removeEventListener('mousemove',onDrag);window.removeEventListener('mouseup',onUp);
    if(!didDrag&&onHeader){openCategorySidebar(cat);}
    else if(didDrag){pushSnap(pendingDragSnap);scheduleSave();}
  }

  // Touch drag
  let tsx=0,tsy=0,touchOnHeader=false;
  box.addEventListener('touchstart',e=>{
    const t=e.target;
    if(t.tagName==='BUTTON'||t.tagName==='INPUT'||t.tagName==='SELECT'||t.contentEditable==='true')return;
    panning=false;
    pendingDragSnap=snapState();
    tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;
    touchOnHeader=!!e.target.closest('.cat-header');
    const p=nodeMap[cat.id].pos;
    ox=e.touches[0].clientX/scale-p.x;oy=e.touches[0].clientY/scale-p.y;
  },{passive:true});

  box.addEventListener('touchmove',e=>{
    if(!e.touches.length)return;
    const dx=e.touches[0].clientX-tsx,dy=e.touches[0].clientY-tsy;
    if(!dragging&&Math.hypot(dx,dy)>8){dragging=true;box.classList.add('dragging');}
    if(!dragging)return;
    e.preventDefault();e.stopPropagation();
    const nx=e.touches[0].clientX/scale-ox,ny=e.touches[0].clientY/scale-oy;
    nodeMap[cat.id].pos={x:nx,y:ny};box.style.left=nx+'px';box.style.top=ny+'px';drawLines();
  },{passive:false});

  box.addEventListener('touchend',()=>{
    if(dragging){dragging=false;box.classList.remove('dragging');pushSnap(pendingDragSnap);scheduleSave();}
    else if(touchOnHeader){openCategorySidebar(cat);}
  },{passive:true});
}

// ═══════════════════════════════════════
// SVG LINES
// ═══════════════════════════════════════
function drawLines(){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  CONNS.forEach(({a,b,c,w})=>{
    const ca=cats.find(x=>x.id===a),cb=cats.find(x=>x.id===b);
    if(!ca||!cb||!nodeMap[a]||!nodeMap[b])return;
    const A=centerOf(ca),B=centerOf(cb),mx=(A.x+B.x)/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${A.x},${A.y} C${mx},${A.y} ${mx},${B.y} ${B.x},${B.y}`);
    p.setAttribute('stroke',c);p.setAttribute('stroke-width',w||1.5);
    p.setAttribute('fill','none');p.setAttribute('stroke-opacity','0.25');
    svgEl.appendChild(p);
  });
}

// ═══════════════════════════════════════
// PAN / ZOOM (mouse + touch)
// ═══════════════════════════════════════
let panning=false,px0=0,py0=0;

// Mouse pan
wrap.addEventListener('mousedown',e=>{if(e.button!==0&&e.button!==1)return;panning=true;px0=e.clientX-panX;py0=e.clientY-panY;wrap.classList.add('panning');});
window.addEventListener('mousemove',e=>{if(!panning)return;panX=e.clientX-px0;panY=e.clientY-py0;applyTransform();});
window.addEventListener('mouseup',()=>{panning=false;wrap.classList.remove('panning');});

// Mouse wheel zoom
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?-0.08:0.08,rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const ns=Math.min(Math.max(scale+d,0.15),3);
  panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);scale=ns;applyTransform();
},{passive:false});

// Touch pan + pinch zoom
let pinchDist0=0,pinchScale0=1,pinchMidX=0,pinchMidY=0,pinchPanX0=0,pinchPanY0=0;

wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    panning=true;
    px0=e.touches[0].clientX-panX;py0=e.touches[0].clientY-panY;
    wrap.classList.add('panning');
  }else if(e.touches.length===2){
    panning=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchDist0=Math.hypot(dx,dy);pinchScale0=scale;
    pinchPanX0=panX;pinchPanY0=panY;
    const rect=wrap.getBoundingClientRect();
    pinchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
    pinchMidY=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
  }
},{passive:true});

wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&panning){
    panX=e.touches[0].clientX-px0;panY=e.touches[0].clientY-py0;applyTransform();
  }else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    const ns=Math.min(Math.max(pinchScale0*dist/pinchDist0,0.15),3);
    panX=pinchMidX-(pinchMidX-pinchPanX0)*(ns/pinchScale0);
    panY=pinchMidY-(pinchMidY-pinchPanY0)*(ns/pinchScale0);
    scale=ns;applyTransform();
  }
},{passive:false});

wrap.addEventListener('touchend',e=>{
  if(e.touches.length===0){panning=false;wrap.classList.remove('panning');}
},{passive:true});

function zoomBy(d){const ns=Math.min(Math.max(scale+d,0.15),3);const mx=wrap.clientWidth/2,my=wrap.clientHeight/2;panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);scale=ns;applyTransform();}
function resetView(){scale=0.72;panX=60;panY=20;applyTransform();}
function applyTransform(){canvas.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function openModal(){document.getElementById('modal-bg').classList.add('show');document.getElementById('m-name').focus();}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');}
function confirmModal(){const n=document.getElementById('m-name').value.trim(),c=document.getElementById('m-color').value;if(!n)return;addCategory(n,c);document.getElementById('m-name').value='';closeModal();}
document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal();});
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ═══════════════════════════════════════
// FOOTER
// ═══════════════════════════════════════
function updateFooter(){
  const all=cats.flatMap(c=>c.s);
  const done=all.filter(x=>x[1]==='d').length,gdd=all.filter(x=>x[1]==='g').length;
  document.getElementById('footer').textContent=`${all.length} sistemas · ${done} implementados · ${gdd} con GDD · ${all.length-done-gdd} pendientes`;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
applyTransform();
renderAll(); // always render from local defaults immediately
updateHistoryUI();

setSyncStatus('connecting');
loadFromDB()
  .then(() => subscribeRealtime())
  .catch(() => setSyncStatus('offline'));
</script>
